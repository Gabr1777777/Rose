<style>
    /* --- CONFIGURAÇÕES DE FUNDO --- */
    body, #xat_user_id {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        color: white;
        overflow-x: hidden;
    }

    .bg-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-image: url('https://i.imgur.com/UB2QLtd.gif');
        background-size: cover;
        background-position: center;
        z-index: -2;
    }

    /* --- TELA DE ENTRADA (LANDING PAGE) --- */
    #landing-page {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition: opacity 1s ease, visibility 1s;
        background: rgba(0,0,0,0.2);
    }

    .enter-btn {
        padding: 18px 50px;
        font-size: 22px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        background: linear-gradient(270deg, #d4af37, #ffdf7e, #8a6d3b, #d4af37);
        background-size: 600% 600%;
        animation: textGradient 4s ease infinite;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        transition: transform 0.3s ease;
    }

    .enter-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.7);
    }

    /* --- ESTRUTURA PRINCIPAL --- */
    .main-wrapper {
        max-width: 900px;
        margin: 40px auto;
        background: rgba(10, 10, 10, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.2);
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1.5s ease, transform 1.5s ease;
    }

    .main-wrapper.visible {
        opacity: 1;
        transform: translateY(0);
    }

    /* --- CABEÇALHO UNIFICADO --- */
    .header-banner {
        height: 250px; /* Aumentado para acomodar os novos elementos */
        position: relative;
        border-bottom: 2px solid #d4af37;
        display: flex;
        flex-direction: column; /* Organiza avatar e texto verticalmente */
        justify-content: center;
        align-items: center;
        overflow: hidden;
        padding-top: 20px; /* Espaço no topo */
    }

    @keyframes textGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Container para os textos Nome e ID */
    .header-text-container {
        text-align: center;
        width: 100%;
        margin-top: 10px; /* Espaço após o avatar */
    }

    .header-text {
        font-size: 60px; /* Ligeiramente menor para caber melhor */
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -1px;
        line-height: 1;
        background: linear-gradient(270deg, #d4af37, #ffdf7e, #1a1a1a, #d4af37);
        background-size: 600% 600%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: textGradient 6s ease infinite;
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        display: block; /* Garante que ocupe a linha toda */
    }

    .header-id {
        font-size: 24px; /* Letras menores */
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        line-height: 1.2;
        background: linear-gradient(270deg, #d4af37, #ffdf7e, #1a1a1a, #d4af37);
        background-size: 600% 600%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: textGradient 6s ease infinite;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        display: block; /* Garante que fique abaixo do nome */
        margin-top: 5px;
    }

    /* --- ANIMAÇÕES DA FOTO DE PERFIL --- */
    @keyframes floatAvatar {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    @keyframes glowAvatar {
        0% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.4); border-color: #d4af37; }
        50% { box-shadow: 0 0 25px rgba(212, 175, 55, 0.8); border-color: #ffdf7e; }
        100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.4); border-color: #d4af37; }
    }

    .avatar-box {
        position: relative; /* Mudado de absolute para relative para flutuar dentro */
        text-align: center;
        animation: floatAvatar 4s ease-in-out infinite; 
        margin-bottom: 10px; /* Espaço antes do texto */
        z-index: 10; /* Garante que fique acima de outros efeitos se houver */
    }

    .avatar-img {
        width: 120px; /* Ligeiramente menor para equilibrar com o texto */
        height: 120px;
        border-radius: 50%;
        border: 4px solid #d4af37;
        background: url('https://i.imgur.com/YDKnxJi.jpeg') center/cover;
        animation: glowAvatar 3s infinite; 
        margin: 0 auto; /* Centraliza horizontalmente */
    }

    /* --- CONTEÚDO --- */
    .profile-content {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 25px;
        padding: 40px; /* Ajustado o padding superior pois o avatar subiu */
    }

    .card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
    }

    .card h3 {
        margin-top: 0;
        color: #d4af37;
        border-left: 4px solid #d4af37;
        padding-left: 10px;
        font-size: 18px;
    }

    /* --- ABAS E BOTÕES --- */
    .nav-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .tab-btn {
        background: transparent;
        border: 1px solid #d4af37;
        color: #d4af37;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .tab-btn:hover { background: rgba(212, 175, 55, 0.2); }

    .content-pane { display: none; }
    .active-pane { display: block; animation: fadeIn 0.4s ease; }

    /* --- GALERIA GRID --- */
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    .gal-thumb {
        width: 100%;
        height: 80px;
        border-radius: 6px;
        background-size: cover;
        background-position: center;
        border: 1px solid #444;
        cursor: zoom-in;
        transition: 0.3s;
    }
    .gal-thumb:hover { border-color: #d4af37; transform: scale(1.05); }

    /* --- PLAYER --- */
    #player-section {
        display: none; 
        background: #000;
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #d4af37;
        text-align: center;
    }

    .vol-btn {
        background: #d4af37;
        border: none;
        color: black;
        padding: 4px 10px;
        margin: 2px;
        font-size: 11px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 3px;
    }

    /* --- ZOOM & SEGURANÇA --- */
    #zoom-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); display: none;
        justify-content: center; align-items: center; z-index: 5000;
        cursor: zoom-out; backdrop-filter: blur(8px);
    }
    #zoom-img {
        max-width: 90%; max-height: 85%; border: 3px solid #d4af37;
        border-radius: 10px; transform: scale(0.8); transition: 0.3s;
    }
    #zoom-overlay.active #zoom-img { transform: scale(1); }

    #sec-msg {
        position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
        background: #d4af37; color: black; padding: 12px 30px;
        font-weight: bold; border-radius: 8px 8px 0 0; transition: 0.4s; z-index: 6000;
    }
    .show-sec { bottom: 0 !important; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>

<div class="bg-glow"></div>

<div id="landing-page">
    <button class="enter-btn" onclick="startExperience()">Entrar</button>
</div>

<div class="main-wrapper" id="main-content">
    <div class="header-banner">
        <div class="avatar-box">
            <div class="avatar-img"></div>
        </div>
        <div class="header-text-container">
            <span class="header-text">Rose</span>
            <span class="header-id">ID: 1553911066</span>
        </div>
    </div>

    <div class="profile-content">
        <div class="left-side">
            <div class="nav-tabs">
                <button class="tab-btn" onclick="openTab('tab-inicio')">Inicio</button>
                <button class="tab-btn" onclick="openTab('tab-perfil')">Perfil</button>
                <button class="tab-btn" onclick="openTab('tab-galeria')">Galería</button>
                <button class="tab-btn" onclick="toggleMusic()">Reproductor</button>
            </div>

            <div id="tab-inicio" class="content-pane active-pane">
                <div class="card">
                    <h3>Bienvenidos</h3>
                    <p>Jehová es mi pastor y nada me faltará</p>
                </div>
            </div>

            <div id="tab-perfil" class="content-pane">
                <div class="card">
                    <h3>Datos Personales</h3>
                    <p><b>🌍 País:</b> El Salvador | <b>🎂 Edad:</b> 20 Años</p>
                    <p><b>🗣️ Idioma:</b> Español | <b>📅 Año:</b> 2006 </p>
                    <p><b>♈ Signo:</b> Piscis </p>
                </div>
            </div>

            <div id="tab-galeria" class="content-pane">
                <div class="card">
                    <h3>Mi Galería</h3>
                    <div class="gallery-grid">
                        <div class="gal-thumb" style="background-image: url('https://i.imgur.com/LSZOs8Q.jpeg')" onclick="zoom('https://i.imgur.com/LSZOs8Q.jpeg')"></div>
                        <div class="gal-thumb" style="background-image: url('https://i.imgur.com/BGULIuI.jpeg')" onclick="zoom('https://i.imgur.com/BGULIuI.jpeg')"></div>
                        <div class="gal-thumb" style="background-image: url('https://i.imgur.com/HCn75BA.jpeg')" onclick="zoom('https://i.imgur.com/HCn75BA.jpeg')"></div>
                        <div class="gal-thumb" style="background-image: url('https://i.imgur.com/QvXRzEF.jpeg')" onclick="zoom('https://i.imgur.com/QvXRzEF.jpeg')"></div>
                        <div class="gal-thumb" style="background-image: url('https://i.imgur.com/0h6IQIZ.jpeg')" onclick="zoom('https://i.imgur.com/0h6IQIZ.jpeg')"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-side">
            <div id="player-section">
                <h3 style="color:#d4af37; font-size: 14px; margin-bottom: 10px;">Reproductor de Música</h3>
                <marquee id="track-title" style="font-size: 11px; color: #aaa;">Cargando...</marquee>
                <audio id="player-core"></audio>
                <div style="margin-top:10px;">
                    <span style="font-size:10px">VOL:</span>
                    <button class="vol-btn" onclick="setV(0)">0%</button>
                    <button class="vol-btn" onclick="setV(0.5)">50%</button>
                    <button class="vol-btn" onclick="setV(1)">100%</button>
                </div>
            </div>

            <div class="card" style="margin-top:20px; text-align:center; font-size:11px; color:#555;">
                MULTITECH SECURITY <br> © 2026
            </div>
        </div>
    </div>
</div>

<div id="zoom-overlay" onclick="closeZ()"><img id="zoom-img" src=""></div>
<div id="sec-msg">Copyright - Acceso Prohibido</div>

<script>
    /* --- LOGICA DE TRANSIÇÃO --- */
    function startExperience() {
        const lp = document.getElementById('landing-page');
        const main = document.getElementById('main-content');
        
        lp.style.opacity = '0';
        lp.style.visibility = 'hidden';
        
        main.classList.add('visible');
        
        // Inicia a música automaticamente
        if(!aud.src) loadM(0);
        document.getElementById('player-section').style.display = "block";
    }

    function openTab(id) {
        document.querySelectorAll('.content-pane').forEach(p => p.classList.remove('active-pane'));
        document.getElementById(id).classList.add('active-pane');
    }

    function zoom(url) {
        const o = document.getElementById('zoom-overlay');
        const i = document.getElementById('zoom-img');
        i.src = url; o.style.display = 'flex';
        setTimeout(() => o.classList.add('active'), 10);
    }
    function closeZ() {
        const o = document.getElementById('zoom-overlay');
        o.classList.remove('active');
        setTimeout(() => o.style.display = 'none', 300);
    }

    const playlist = [
        { n: "Abraham-Mateo - BAI LALA", u: "https://www.dropbox.com/scl/fi/gw8940zfvm60ul7malxox/Abraham-Mateo-BAI-LALA.mp3?rlkey=puytwnkxllb6tmz35htfr8tmh&st=ud55ktgf&raw=1" },
        { n: "Alex Warren - Ordinary", u: "https://www.dropbox.com/scl/fi/lpcx92wv63wzcm6z56l7q/Alex-Warren-Ordinary.mp3?rlkey=pdxjo778t66ecrja08pfyij6k&st=zb53k17t&raw=1" },
        { n: "Eminem - You dont know", u: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" },
        { n: "The Sound of Silence", u: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=qty8093e&raw=1" },
        { n: "Desireless - Voyage Voyage", u: "https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=2ldonj76&raw=1" }
    ];
    let curr = 0;
    const aud = document.getElementById('player-core');
    const tit = document.getElementById('track-title');

    function loadM(i) {
        aud.src = playlist[i].u;
        tit.innerText = "Reproduciendo: " + playlist[i].n;
        aud.play();
    }
    aud.onended = () => { curr = (curr + 1) % playlist.length; loadM(curr); };
    function setV(v) { aud.volume = v; }
    function toggleMusic() {
        const s = document.getElementById('player-section');
        if(s.style.display === "block") { s.style.display = "none"; }
        else { s.style.display = "block"; if(!aud.src) loadM(0); }
    }

    function sAlert() {
        const a = document.getElementById('sec-msg');
        a.classList.add('show-sec');
        setTimeout(() => a.classList.remove('show-sec'), 2000);
    }
    document.addEventListener('contextmenu', e => { e.preventDefault(); sAlert(); });
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S')) {
            document.preventDefault(); sAlert();
        }
    });
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
</script>
