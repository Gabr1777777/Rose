<style>
    /* --- CONFIGURAÇÕES DE FUNDO --- */
    body, #xat_user_id {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        color: white;
        overflow-x: hidden;
    }

    .bg-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-image: url('https://i.imgur.com/1RWKBkY.gif');
        background-size: cover;
        background-position: center;
        z-index: -2;
    }

    /* --- TELA DE ENTRADA (LANDING PAGE) --- */
    #landing-page {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition: opacity 1s ease, visibility 1s;
        background: rgba(0,0,0,0.2);
    }

    .enter-btn {
        padding: 18px 50px;
        font-size: 22px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        background: linear-gradient(270deg, #8a2be2, #ba55d3, #4b0082, #8a2be2);
        background-size: 600% 600%;
        animation: textGradient 4s ease infinite;
        box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        transition: transform 0.3s ease;
    }

    .enter-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 30px rgba(186, 85, 211, 0.7);
    }

    /* --- ESTRUTURA PRINCIPAL --- */
    .main-wrapper {
        max-width: 900px;
        margin: 20px auto;
        width: 92%;
        background: rgba(10, 10, 10, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 43, 226, 0.3);
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 15px rgba(138, 43, 226, 0.2);
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1.5s ease, transform 1.5s ease;
    }

    .main-wrapper.visible {
        opacity: 1;
        transform: translateY(0);
    }

    /* --- CABEÇALHO UNIFICADO --- */
    .header-banner {
        min-height: 220px;
        position: relative;
        border-bottom: 2px solid #8a2be2;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        padding: 20px 10px;
        box-sizing: border-box;
    }

    @keyframes textGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Container para os textos Nome e ID */
    .header-text-container {
        text-align: center;
        width: 100%;
        margin-top: 10px;
    }

    .header-text {
        font-size: 60px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -1px;
        line-height: 1;
        background: linear-gradient(270deg, #8a2be2, #ba55d3, #1a1a1a, #8a2be2);
        background-size: 600% 600%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: textGradient 6s ease infinite;
        text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        display: block;
    }

    .header-id {
        font-size: 24px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        line-height: 1.2;
        background: linear-gradient(270deg, #8a2be2, #ba55d3, #1a1a1a, #8a2be2);
        background-size: 600% 600%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: textGradient 6s ease infinite;
        text-shadow: 0 0 10px rgba(138, 43, 226, 0.4);
        display: block;
        margin-top: 5px;
    }

    /* --- ANIMAÇÕES DA FOTO DE PERFIL --- */
    @keyframes floatAvatar {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    @keyframes glowAvatar {
        0% { box-shadow: 0 0 10px rgba(138, 43, 226, 0.4); border-color: #8a2be2; }
        50% { box-shadow: 0 0 25px rgba(186, 85, 211, 0.8); border-color: #ba55d3; }
        100% { box-shadow: 0 0 10px rgba(138, 43, 226, 0.4); border-color: #8a2be2; }
    }

    .avatar-box {
        position: relative;
        text-align: center;
        animation: floatAvatar 4s ease-in-out infinite; 
        margin-bottom: 10px;
        z-index: 10;
    }

    .avatar-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 4px solid #8a2be2;
        background: url('https://i.imgur.com/xbRdqTY.jpeg') center/cover;
        animation: glowAvatar 3s infinite; 
        margin: 0 auto;
    }

    /* --- CONTEÚDO RESPONSIVO --- */
    .profile-content {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 25px;
        padding: 40px;
    }

    .card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        word-wrap: break-word;
    }

    .card h3 {
        margin-top: 0;
        color: #ba55d3;
        border-left: 4px solid #8a2be2;
        padding-left: 10px;
        font-size: 18px;
    }

    /* --- ABAS E BOTÕES --- */
    .nav-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .tab-btn {
        background: transparent;
        border: 1px solid #8a2be2;
        color: #ba55d3;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
        flex-grow: 1;
        text-align: center;
    }

    .tab-btn:hover { background: rgba(138, 43, 226, 0.2); }

    .content-pane { display: none; }
    .active-pane { display: block; animation: fadeIn 0.4s ease; }

    /* --- GALERIA GRID --- */
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    .gal-thumb {
        width: 100%;
        height: 80px;
        border-radius: 6px;
        background-size: cover;
        background-position: center;
        border: 1px solid #444;
        cursor: zoom-in;
        transition: 0.3s;
    }
    .gal-thumb:hover { border-color: #ba55d3; transform: scale(1.05); }

    /* --- PLAYER --- */
    #player-section {
        display: none; 
        background: #000;
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #8a2be2;
        text-align: center;
    }

    .vol-btn {
        background: #8a2be2;
        border: none;
        color: white;
        padding: 6px 12px;
        margin: 2px;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 3px;
    }

    /* --- ZOOM & SEGURANÇA --- */
    #zoom-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); display: none;
        justify-content: center; align-items: center; z-index: 5000;
        cursor: zoom-out; backdrop-filter: blur(8px);
    }
    #zoom-img {
        max-width: 90%; max-height: 85%; border: 3px solid #8a2be2;
        border-radius: 10px; transform: scale(0.8); transition: 0.3s;
    }
    #zoom-overlay.active #zoom-img { transform: scale(1); }

    #sec-msg {
        position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
        background: #8a2be2; color: white; padding: 12px 30px;
        font-weight: bold; border-radius: 8px 8px 0 0; transition: 0.4s; z-index: 6000;
        width: max-content; max-width: 90%; text-align: center;
    }
    .show-sec { bottom: 0 !important; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* --- EFEITO DA MÁQUINA DE ESCREVER --- */
    .typing-effect {
        border-right: 2px solid #ba55d3;
        white-space: normal;
        display: inline-block;
        animation: blink-cursor 0.75s step-end infinite;
        max-width: 100%;
        overflow: hidden;
    }
    @keyframes blink-cursor {
        from, to { border-color: transparent }
        50% { border-color: #ba55d3; }
    }
    .typing-finished {
        border-right: none !important;
        animation: none !important;
    }

    /* --- MEDIA QUERIES PARA CELULAR (RESPONSIVIDADE) --- */
    @media (max-width: 768px) {
        .main-wrapper {
            margin: 10px auto;
        }
        .profile-content {
            grid-template-columns: 1fr; /* Transforma em uma coluna única no mobile */
            padding: 15px;
            gap: 15px;
        }
        .header-text {
            font-size: 40px; /* Diminui o nome grande para não quebrar a tela */
        }
        .header-id {
            font-size: 18px;
        }
        .enter-btn {
            padding: 15px 35px;
            font-size: 18px;
            letter-spacing: 2px;
        }
        .gallery-grid {
            grid-template-columns: repeat(3, 1fr); /* Mantém 3 fotos por linha, mas com ajuste de toque */
        }
        .gal-thumb {
            height: 70px;
        }
    }
</style>

<div class="bg-glow"></div>

<div id="landing-page">
    <button class="enter-btn" onclick="startExperience()">Entrar</button>
</div>

<div class="main-wrapper" id="main-content">
    <div class="header-banner">
        <div class="avatar-box">
            <div class="avatar-img"></div>
        </div>
        <div class="header-text-container">
            <span class="header-text">Rose</span>
            <span class="header-id">ID: 1553911066</span>
        </div>
    </div>

    <div class="profile-content">
        <div class="left-side">
            <div class="nav-tabs">
                <button class="tab-btn" onclick="openTab('tab-inicio')">Inicio</button>
                <button class="tab-btn" onclick="openTab('tab-perfil')">Perfil</button>
                <button class="tab-btn" onclick="openTab('tab-galeria')">Galería</button>
                <button class="tab-btn" onclick="toggleMusic()">Reproductor</button>
            </div>

            <div id="tab-inicio" class="content-pane active-pane">
                <div class="card">
                    <h3>Bienvenidos</h3>
                    <p id="typing-text" class="typing-effect"></p>
                </div>
            </div>

            <div id="tab-perfil" class="content-pane">
                <div class="card">
                    <h3>Datos Personales</h3>
                    <p><b>🌍 País:</b> El Salvador | <b>🎂 Edad:</b> 20 Años</p>
                    <p><b>🗣️ Idioma:</b> Español | <b>📅 Año:</b> 2006 </p>
                    <p><b>♈ Signo:</b> Piscis </p>
                </div>
            </div>

            <div id="tab-galeria" class="content-pane">
                <div class="card">
                    <h3>Mi Galería</h3>
                    <div class="gallery-grid">
                        <div class="gal-thumb" style="background-image: url('https://i.imgur.com/4Tlu2zv.jpeg')" onclick="zoom('https://i.imgur.com/4Tlu2zv.jpeg')"></div>
                        <div class="gal-thumb" style="background-image: url('https://i.imgur.com/V7f4fFD.jpeg')" onclick="zoom('https://i.imgur.com/V7f4fFD.jpeg')"></div>
                        <div class="gal-thumb" style="background-image: url('https://i.imgur.com/uPdPECx.jpeg')" onclick="zoom('https://i.imgur.com/uPdPECx.jpeg')"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-side">
            <div id="player-section">
                <h3 style="color:#ba55d3; font-size: 14px; margin-bottom: 10px;">Reproductor de Música</h3>
                <marquee id="track-title" style="font-size: 11px; color: #aaa;">Cargando...</marquee>
                <audio id="player-core"></audio>
                <div style="margin-top:10px;">
                    <span style="font-size:10px">VOL:</span>
                    <button class="vol-btn" onclick="setV(0)">0%</button>
                    <button class="vol-btn" onclick="setV(0.5)">50%</button>
                    <button class="vol-btn" onclick="setV(1)">100%</button>
                </div>
            </div>

            <div class="card" style="margin-top:20px; text-align:center; font-size:11px; color:#555;">
                By:Gabr (1777777) <br> © 2026
            </div>
        </div>
    </div>
</div>

<div id="zoom-overlay" onclick="closeZ()"><img id="zoom-img" src=""></div>
<div id="sec-msg">Copyright - Acceso Prohibido</div>

<script>
    /* --- LOGICA DE TRANSIÇÃO --- */
    function startExperience() {
        const lp = document.getElementById('landing-page');
        const main = document.getElementById('main-content');
        
        lp.style.opacity = '0';
        lp.style.visibility = 'hidden';
        
        main.classList.add('visible');
        
        // Inicia a música automaticamente
        if(!aud.src) loadM(0);
        document.getElementById('player-section').style.display = "block";

        // Inicia o efeito de digitação após 800ms da entrada
        setTimeout(typeWriter, 800);
    }

    function openTab(id) {
        document.querySelectorAll('.content-pane').forEach(p => p.classList.remove('active-pane'));
        document.getElementById(id).classList.add('active-pane');
    }

    function zoom(url) {
        const o = document.getElementById('zoom-overlay');
        const i = document.getElementById('zoom-img');
        i.src = url; o.style.display = 'flex';
        setTimeout(() => o.classList.add('active'), 10);
    }
    function closeZ() {
        const o = document.getElementById('zoom-overlay');
        o.classList.remove('active');
        setTimeout(() => o.style.display = 'none', 300);
    }

    const playlist = [
        { n: "Golden Brown X Love Story (Slowed)", u: "https://www.dropbox.com/scl/fi/p47tcaltcvo28sc8llzau/Golden-Brown-X-Love-Story-Slowed.mp3?rlkey=tce9o7sr6n2gkyar9k190pock&st=h5ki1xmw&raw=1" }
    ];
    let curr = 0;
    const aud = document.getElementById('player-core');
    const tit = document.getElementById('track-title');

    function loadM(i) {
        aud.src = playlist[i].u;
        tit.innerText = "Reproduciendo: " + playlist[i].n;
        aud.play().catch(e => console.log("Interação necessária para tocar áudio"));
    }
    aud.onended = () => { curr = (curr + 1) % playlist.length; loadM(curr); };
    function setV(v) { aud.volume = v; }
    function toggleMusic() {
        const s = document.getElementById('player-section');
        if(s.style.display === "block") { s.style.display = "none"; }
        else { s.style.display = "block"; if(!aud.src) loadM(0); }
    }

    /* --- LOGICA DO EFEITO DIGITANDO --- */
    const textToType = "Cuando te conocí, entendí que el amor verdadero no se busca, simplemente llega y transforma nuestras vidas";
    let textIndex = 0;

    function typeWriter() {
        const element = document.getElementById('typing-text');
        if (textIndex < textToType.length) {
            element.innerHTML += textToType.charAt(textIndex);
            textIndex++;
            setTimeout(typeWriter, 90);
        } else {
            element.classList.add('typing-finished');
        }
    }

    function sAlert() {
        const a = document.getElementById('sec-msg');
        a.classList.add('show-sec');
        setTimeout(() => a.classList.remove('show-sec'), 2000);
    }
    document.addEventListener('contextmenu', e => { e.preventDefault(); sAlert(); });
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S')) {
            e.preventDefault(); sAlert();
        }
    });
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
</script>
