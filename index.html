<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Rose</title>
    <style>
        :root {
            --gold: #c5a059;
            --bg-dark: #0a0e14;
            --blue-neon: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Georgia', serif; }
        body { background: var(--bg-dark); color: white; overflow: hidden; height: 100vh; }

        /* ESTRELAS GRANDES E NÍTIDAS */
        #stars-container { position: fixed; width: 100%; height: 100%; z-index: 1; overflow: hidden; pointer-events: none; }
        .star { position: absolute; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* TELA ENTRADA */
        #landing-page {
            position: relative; z-index: 100; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-dark); transition: 1s ease;
        }
        .btn-entrar {
            width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--blue-neon);
            background: radial-gradient(circle, rgba(0, 210, 255, 0.2), transparent);
            color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px var(--blue-neon); animation: pulse 2s infinite;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); } 70% { box-shadow: 0 0 0 25px rgba(0, 210, 255, 0); } }

        /* PERFIL */
        #profile-page {
            position: relative; z-index: 10; height: 100vh;
            display: none; opacity: 0; justify-content: center; align-items: center;
            transition: 1s ease;
        }
        .card {
            width: 950px; min-height: 600px; background: rgba(15, 20, 30, 0.95);
            border: 1px solid var(--glass); border-radius: 15px; padding: 30px;
            position: relative; box-shadow: 0 0 60px black; text-align: center;
        }

        .avatar {
            width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold);
            margin: 0 auto 15px; padding: 4px; background: rgba(197, 160, 89, 0.1); overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .nav-btn {
            background: var(--glass); border: 1px solid var(--gold); color: white;
            padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 11px;
            transition: 0.3s; text-transform: uppercase;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--gold); color: black; font-weight: bold; }

        /* SEÇÕES */
        .content-section { display: none; min-height: 250px; animation: fadeIn 0.6s ease forwards; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* BANNER GRADIENTE ANIMADO */
        .banner-welcome {
            background: linear-gradient(-45deg, var(--gold), #fff, var(--blue-neon), var(--gold));
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            font-weight: bold;
            margin-top: 40px;
            animation: gradientText 5s ease infinite;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes gradientText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* GALERIA AMPLIADA COM ZOOM */
        .slider { width: 600px; height: 350px; overflow: hidden; position: relative; margin: 0 auto; border-radius: 10px; border: 2px solid var(--gold); cursor: zoom-in; }
        .slide-track { display: flex; transition: 0.8s ease; width: 300%; height: 100%; }
        .slide-track img { width: 600px; height: 350px; object-fit: cover; }

        /* ZOOM MODAL (LIGHTBOX) */
        #zoom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        #zoom-modal img { max-width: 90%; max-height: 90%; border: 3px solid var(--gold); border-radius: 10px; }

        /* PLAYER MODAL */
        #music-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; background: rgba(10, 14, 20, 0.98); border: 1px solid var(--gold);
            padding: 20px; border-radius: 15px; z-index: 1000; box-shadow: 0 0 40px #000;
        }
        .playlist-list { list-style: none; text-align: left; font-size: 10px; margin-top: 15px; max-height: 150px; overflow-y: auto; }
        .playlist-list li { padding: 8px; border-bottom: 1px solid rgba(197, 160, 89, 0.1); cursor: pointer; display: flex; justify-content: space-between; }
        .active-song { color: var(--gold); background: rgba(197, 160, 89, 0.1); font-weight: bold; }

    </style>
</head>
<body>

    <div id="stars-container"></div>
    <audio id="main-audio"></audio>

    <div id="landing-page">
        <button class="btn-entrar" onclick="abrirPerfil()">ENTRAR</button>
    </div>

    <div id="profile-page">
        <div class="card">
            <h2 style="color:var(--gold); letter-spacing: 4px; margin-bottom: 10px;">PERFIL PROFISSIONAL</h2>
            <div class="avatar"><img src="https://i.imgur.com/Z8OtVir.jpeg"></div>

            <nav>
                <button class="nav-btn active" onclick="tab('inicio', this)">Início</button>
                <button class="nav-btn" onclick="tab('galeria', this)">Galeria</button>
                <button class="nav-btn" onclick="tab('sobre', this)">Sobre Mim</button>
                <button class="nav-btn" onclick="tab('perfil', this)">Perfil</button>
                <button class="nav-btn" onclick="togglePlayer()" style="color:var(--blue-neon); border-color:var(--blue-neon)">Música ♫</button>
            </nav>

            <div id="inicio" class="content-section active">
                <h1 class="banner-welcome">Bem vindos ao meu Xatspace</h1>
                <p style="margin-top: 20px; font-size: 18px; color: var(--gold); letter-spacing: 1px;">Gabriel</p>
                <p style="opacity: 0.6; font-size: 14px;">Design e Inovação</p>
            </div>

            <div id="galeria" class="content-section">
                <div class="slider" onclick="abrirZoom()">
                    <div class="slide-track" id="track">
                        <img src="https://i.imgur.com/Z8OtVir.jpeg" id="img1">
                        <img src="https://i.imgur.com/Z8OtVir.jpeg" id="img2" style="filter: brightness(0.7)">
                        <img src="https://i.imgur.com/Z8OtVir.jpeg" id="img3" style="filter: sepia(0.4)">
                    </div>
                </div>
                <p style="font-size: 10px; color:var(--gold); margin-top: 10px;">Clique na foto para dar zoom</p>
            </div>

            <div id="sobre" class="content-section">
                <p style="margin-top: 60px; font-style: italic; padding: 0 80px;">"BUSCANDO CRESCIMENTO, CONHECIMENTO E IMPACTO POSITIVO. CADA DESAFIO É UMA OPORTUNIDADE DE APRENDIZADO."</p>
            </div>

            <div id="perfil" class="content-section">
                <div style="margin-top: 60px; display: inline-block; text-align: left; border-left: 2px solid var(--gold); padding-left: 20px;">
                    <p><strong>IDADE:</strong> 21 Anos</p>
                    <p><strong>SIGNO:</strong> Peixes ♓</p>
                    <p><strong>PAÍS:</strong> Brasil 🇧🇷</p>
                </div>
            </div>

            <div id="music-modal">
                <div style="display:flex; justify-content:space-between; color:var(--gold); font-size: 12px; border-bottom:1px solid var(--gold); padding-bottom:5px;">
                    <span>PLAYER PREMIUM</span>
                    <span style="cursor:pointer" onclick="togglePlayer()">✕</span>
                </div>
                <div style="margin: 15px 0; font-size: 12px;" id="track-name">Carregando...</div>
                <div style="display:flex; justify-content:center; gap:15px;">
                    <button class="nav-btn" onclick="prev()">◀</button>
                    <button class="nav-btn" onclick="playPause()" id="btnP">⏸</button>
                    <button class="nav-btn" onclick="next()">▶</button>
                </div>
                <ul class="playlist-list" id="playlist-ui"></ul>
            </div>
        </div>
    </div>

    <div id="zoom-modal" onclick="fecharZoom()">
        <img id="img-zoomed" src="">
    </div>

    <script>
        const playlist = [
            { name: "Abraham-Mateo - BAI LALA", url: "https://www.dropbox.com/scl/fi/gw8940zfvm60ul7malxox/Abraham-Mateo-BAI-LALA.mp3?rlkey=puytwnkxllb6tmz35htfr8tmh&st=ud55ktgf&raw=1" },
            { name: "Alex Warren - Ordinary", url: "https://www.dropbox.com/scl/fi/lpcx92wv63wzcm6z56l7q/Alex-Warren-Ordinary.mp3?rlkey=pdxjo778t66ecrja08pfyij6k&st=zb53k17t&raw=1" },
            { name: "Eminem - You dont know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" },
            { name: "The Sound of Silence", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=qty8093e&raw=1" },
            { name: "Desireless - Voyage Voyage", url: "https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=2ldonj76&raw=1" }
        ];

        let songIdx = 0;
        const audio = document.getElementById('main-audio');

        function loadSong() {
            audio.src = playlist[songIdx].url;
            document.getElementById('track-name').innerText = playlist[songIdx].name;
            updateUI();
        }

        function playSong() { audio.play(); document.getElementById('btnP').innerText = '⏸'; }
        function playPause() { if(audio.paused) playSong(); else { audio.pause(); document.getElementById('btnP').innerText = '▶'; } }
        function next() { songIdx = (songIdx + 1) % playlist.length; loadSong(); playSong(); }
        function prev() { songIdx = (songIdx - 1 + playlist.length) % playlist.length; loadSong(); playSong(); }
        
        audio.onended = () => { next(); };

        function updateUI() {
            const ui = document.getElementById('playlist-ui'); ui.innerHTML = '';
            playlist.forEach((s, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${s.name}</span>`;
                if(i === songIdx) li.className = 'active-song';
                li.onclick = () => { songIdx = i; loadSong(); playSong(); };
                ui.appendChild(li);
            });
        }

        const stars = document.getElementById('stars-container');
        for(let i=0; i<45; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random()*5 + 3 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.left = Math.random()*100 + 'vw';
            s.style.top = '-10vh';
            s.style.animationDuration = Math.random()*4 + 3 + 's';
            s.style.animationDelay = Math.random()*5 + 's';
            stars.appendChild(s);
        }

        function abrirPerfil() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('profile-page').style.display = 'flex';
            setTimeout(() => document.getElementById('profile-page').style.opacity = '1', 50);
            loadSong(); playSong();
        }

        function tab(id, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
        }

        function togglePlayer() {
            const m = document.getElementById('music-modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function abrirZoom() {
            const modal = document.getElementById('zoom-modal');
            const img = document.getElementById('img-zoomed');
            img.src = "https://i.imgur.com/Z8OtVir.jpeg";
            modal.style.display = 'flex';
        }
        function fecharZoom() { document.getElementById('zoom-modal').style.display = 'none'; }

        let slideIdx = 0;
        setInterval(() => {
            slideIdx = (slideIdx + 1) % 3;
            const track = document.getElementById('track');
            if(track) track.style.transform = `translateX(-${slideIdx * 600}px)`;
        }, 4000);
    </script>
</body>
</html>
