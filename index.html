<style>
    /* --- CONFIGURAÇÕES DE FUNDO --- */
    body, #xat_user_id {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        color: white;
        overflow-x: hidden;
    }

    .bg-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-image: url('https://i.imgur.com/UB2QLtd.gif');
        background-size: cover;
        background-position: center;
        z-index: -2;
    }

    /* --- TELA DE ENTRADA (LANDING PAGE) --- */
    #landing-page {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition: opacity 1s ease, visibility 1s;
        background: rgba(0,0,0,0.2);
    }

    .enter-btn {
        padding: 18px 50px;
        font-size: 22px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        background: linear-gradient(270deg, #8a2be2, #ba55d3, #4b0082, #8a2be2);
        background-size: 600% 600%;
        animation: textGradient 4s ease infinite;
        box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        transition: transform 0.3s ease;
    }

    .enter-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 30px rgba(186, 85, 211, 0.7);
    }

    /* --- ESTRUTURA PRINCIPAL --- */
    .main-wrapper {
        max-width: 900px;
        margin: 40px auto;
        background: rgba(10, 10, 10, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 43, 226, 0.3);
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 15px rgba(138, 43, 226, 0.2);
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1.5s ease, transform 1.5s ease;
    }

    .main-wrapper.visible {
        opacity: 1;
        transform: translateY(0);
    }

    /* --- CABEÇALHO UNIFICADO --- */
    .header-banner {
        height: 250px; /* Aumentado para acomodar os novos elementos */
        position: relative;
        border-bottom: 2px solid #8a2be2;
        display: flex;
        flex-direction: column; /* Organiza avatar e texto verticalmente */
        justify-content: center;
        align-items: center;
        overflow: hidden;
        padding-top: 20px; /* Espaço no topo */
    }

    @keyframes textGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Container para os textos Nome e ID */
    .header-text-container {
        text-align: center;
        width: 100%;
        margin-top: 10px; /* Espaço após o avatar */
    }

    .header-text {
        font-size: 60px; /* Ligeiramente menor para caber melhor */
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -1px;
        line-height: 1;
        background: linear-gradient(270deg, #8a2be2, #ba55d3, #1a1a1a, #8a2be2);
        background-size: 600% 600%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: textGradient 6s ease infinite;
        text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        display: block; /* Garante que ocupe a linha toda */
    }

    .header-id {
        font-size: 24px; /* Letras menores */
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        line-height: 1.2;
        background: linear-gradient(270deg, #8a2be2, #ba55d3, #1a1a1a, #8a2be2);
        background-size: 600% 600%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: textGradient 6s ease infinite;
        text-shadow: 0 0 10px rgba(138, 43, 226, 0.4);
        display: block; /* Garante que fique abaixo do nome */
        margin-top: 5px;
    }

    /* --- ANIMAÇÕES DA FOTO DE PERFIL --- */
    @keyframes floatAvatar {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    @keyframes glowAvatar {
        0% { box-shadow: 0 0 10px rgba(138, 43, 226, 0.4); border-color: #8a2be2; }
        50% { box-shadow: 0 0 25px rgba(186, 85, 211, 0.8); border-color: #ba55d3; }
        100% { box-shadow: 0 0 10px rgba(138, 43, 226, 0.4); border-color: #8a2be2; }
    }

    .avatar-box {
        position: relative; /* Mudado de absolute para relative para flutuar dentro */
        text-align: center;
        animation: floatAvatar 4s ease-in-out infinite; 
        margin-bottom: 10px; /* Espaço antes do texto */
        z-index: 10; /* Garante que fique acima de outros efeitos se houver */
    }

    .avatar-img {
        width: 120px; /* Ligeiramente menor para equilibrar com o texto */
        height: 120px;
        border-radius: 50%;
        border: 4px solid #8a2be2;
        background: url('https://i.imgur.com/YDKnxJi.jpeg') center/cover;
